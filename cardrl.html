<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Roguelike</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1a1a2e;
            font-family: 'Courier New', monospace;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
<script>
// Game constants
const GRID_SIZE = 20;
const CELL_SIZE = 32;
const UI_HEIGHT = 250;
const STATS_WIDTH = 180;
const ENEMY_INFO_WIDTH = 180;
let CARD_WIDTH = 140;
let CARD_HEIGHT = 200;
let viewportWidth = 20;
let viewportHeight = 20;

// Game state
let gameState = {
    player: { x: 10, y: 10, hp: 20, maxHp: 20, mana: 3, maxMana: 3 },
    enemies: [],
    deck: [],
    hand: [],
    discardPile: [],
    selectedCard: null,
    selectedEnemy: null,
    targeting: false,
    targetRange: 0,
    grid: [],
    turnInProgress: false,
    channeling: 0, // turns remaining for channeling spell
    hoverCard: null,
    hoverInnate: false
};

// Card definitions
const CARD_TYPES = {
    FIREBALL: {
        name: 'Fireball',
        emoji: '🔥',
        manaCost: 1,
        turnCost: 1,
        range: 5,
        description: 'Deal 2 damage',
        effect: (target) => {
            if (target && target.type === 'enemy') {
                target.hp -= 2;
                if (target.hp <= 0) {
                    gameState.enemies = gameState.enemies.filter(e => e !== target);
                    if (gameState.selectedEnemy === target) {
                        gameState.selectedEnemy = null;
                    }
                }
            }
        }
    },
    ARCANE_MISSILE: {
        name: 'Arcane Missile',
        emoji: '✨',
        manaCost: 1,
        turnCost: 0,
        range: 4,
        description: 'Deal 1 damage',
        effect: (target) => {
            if (target && target.type === 'enemy') {
                target.hp -= 1;
                if (target.hp <= 0) {
                    gameState.enemies = gameState.enemies.filter(e => e !== target);
                    if (gameState.selectedEnemy === target) {
                        gameState.selectedEnemy = null;
                    }
                }
            }
        }
    },
    THINK: {
        name: 'Think',
        emoji: '💭',
        manaCost: 1,
        turnCost: 1,
        range: 0,
        description: 'Draw 2 cards',
        effect: () => {
            drawCards(2);
        }
    },
    RUMINATE: {
        name: 'Ruminate',
        emoji: '🧠',
        manaCost: 0,
        turnCost: 2,
        range: 0,
        description: 'Draw 2 cards',
        effect: () => {
            drawCards(2);
        }
    },
    RITUAL: {
        name: 'Ritual',
        emoji: '⭐',
        manaCost: 0,
        turnCost: 1,
        range: 0,
        description: 'Gain 1 mana',
        effect: () => {
            gameState.player.mana = Math.min(gameState.player.mana + 1, gameState.player.maxMana);
        }
    }
};

// Innate ability
const CONCENTRATE = {
    name: 'Concentrate',
    emoji: '🎯',
    manaCost: 0,
    turnCost: 3,
    range: 0,
    description: 'Channeling 3: +1 max mana, +1 card',
    effect: () => {
        gameState.player.maxMana += 1;
        gameState.player.mana += 1;
        drawCards(1);
    }
};

function setup() {
    createCanvas(windowWidth, windowHeight);

    // Calculate viewport dimensions
    calculateViewport();

    // Initialize deck with 2 of each card
    gameState.deck = [
        { ...CARD_TYPES.FIREBALL }, { ...CARD_TYPES.FIREBALL },
        { ...CARD_TYPES.ARCANE_MISSILE }, { ...CARD_TYPES.ARCANE_MISSILE },
        { ...CARD_TYPES.THINK }, { ...CARD_TYPES.THINK },
        { ...CARD_TYPES.RUMINATE }, { ...CARD_TYPES.RUMINATE },
        { ...CARD_TYPES.RITUAL }, { ...CARD_TYPES.RITUAL }
    ];

    shuffleDeck();
    drawCards(5);

    // Spawn some enemies
    spawnEnemies(5);

    // Calculate card dimensions
    calculateCardDimensions();
}

function windowResized() {
    resizeCanvas(windowWidth, windowHeight);
    calculateViewport();
    calculateCardDimensions();
}

function calculateViewport() {
    const availableHeight = height - UI_HEIGHT;
    viewportWidth = Math.floor(width / CELL_SIZE);
    viewportHeight = Math.floor(availableHeight / CELL_SIZE);
}

function calculateCardDimensions() {
    // Calculate available space for cards (excluding stats area and enemy info)
    const availableWidth = width - STATS_WIDTH - ENEMY_INFO_WIDTH - 60; // 60 for padding
    const maxCards = 10; // reasonable maximum hand size
    const spacing = 10;

    // Calculate card width to fit available space
    CARD_WIDTH = Math.min(140, (availableWidth - (maxCards - 1) * spacing) / maxCards);
    CARD_HEIGHT = CARD_WIDTH * 1.4; // maintain aspect ratio
}

function draw() {
    background(20, 20, 40);

    // Calculate camera position (centered on player)
    const cameraX = gameState.player.x - Math.floor(viewportWidth / 2);
    const cameraY = gameState.player.y - Math.floor(viewportHeight / 2);

    // Draw dungeon grid
    drawGrid(cameraX, cameraY);

    // Draw player
    drawEntity(gameState.player.x, gameState.player.y, '🧙', color(100, 100, 255), cameraX, cameraY);

    // Draw enemies
    for (let enemy of gameState.enemies) {
        const isSelected = gameState.selectedEnemy === enemy;
        drawEntity(enemy.x, enemy.y, enemy.emoji, isSelected ? color(255, 255, 100) : color(255, 100, 100), cameraX, cameraY);
    }

    // Draw targeting overlay
    if (gameState.targeting && gameState.selectedCard) {
        drawTargetingOverlay(cameraX, cameraY);
    }

    // Draw UI
    drawUI();

    // Draw hand
    drawHand();

    // Draw innate ability
    drawInnateAbility();

    // Draw enemy info panel
    drawEnemyInfo();
}

function drawGrid(cameraX, cameraY) {
    stroke(50, 50, 70);
    strokeWeight(1);

    for (let vx = 0; vx < viewportWidth; vx++) {
        for (let vy = 0; vy < viewportHeight; vy++) {
            const worldX = cameraX + vx;
            const worldY = cameraY + vy;

            // Draw grid cell
            noFill();
            rect(vx * CELL_SIZE, vy * CELL_SIZE, CELL_SIZE, CELL_SIZE);
        }
    }
}

function drawEntity(x, y, emoji, col, cameraX, cameraY) {
    // Convert world coordinates to screen coordinates
    const screenX = (x - cameraX) * CELL_SIZE + CELL_SIZE / 2;
    const screenY = (y - cameraY) * CELL_SIZE + CELL_SIZE / 2;

    // Only draw if in viewport
    if (x >= cameraX && x < cameraX + viewportWidth &&
        y >= cameraY && y < cameraY + viewportHeight) {
        textAlign(CENTER, CENTER);
        textSize(24);
        text(emoji, screenX, screenY);
    }
}

function drawUI() {
    const uiY = height - UI_HEIGHT;

    // Background for UI
    fill(30, 30, 50);
    noStroke();
    rect(0, uiY, width, UI_HEIGHT);

    // Stats background
    fill(40, 40, 60);
    rect(10, uiY + 10, STATS_WIDTH, UI_HEIGHT - 20, 8);

    // Player stats
    fill(255);
    textAlign(LEFT, TOP);
    textSize(14);
    text(`HP: ${gameState.player.hp}/${gameState.player.maxHp}`, 20, uiY + 20);
    text(`⚡ Mana: ${gameState.player.mana}/${gameState.player.maxMana}`, 20, uiY + 40);
    text(`📚 Deck: ${gameState.deck.length}`, 20, uiY + 60);
    text(`🗑️ Discard: ${gameState.discardPile.length}`, 20, uiY + 80);

    if (gameState.channeling > 0) {
        text(`⏳ Channeling: ${gameState.channeling}`, 20, uiY + 100);
    }

    // Controls help
    textSize(10);
    fill(180);
    text('WASD/Arrows: Move', 20, uiY + 140);
    text('.: Wait', 20, uiY + 155);
    text('Click enemy: Info', 20, uiY + 170);
}

function drawEnemyInfo() {
    const infoX = width - ENEMY_INFO_WIDTH - 10;
    const infoY = height - UI_HEIGHT + 10;

    // Background
    fill(40, 40, 60);
    stroke(200, 200, 220);
    strokeWeight(2);
    rect(infoX, infoY, ENEMY_INFO_WIDTH, UI_HEIGHT - 20, 8);

    if (gameState.selectedEnemy) {
        const enemy = gameState.selectedEnemy;

        // Title
        fill(255);
        textAlign(CENTER, TOP);
        textSize(14);
        text(enemy.name, infoX + ENEMY_INFO_WIDTH / 2, infoY + 10);

        // Emoji
        textSize(48);
        textAlign(CENTER, CENTER);
        text(enemy.emoji, infoX + ENEMY_INFO_WIDTH / 2, infoY + 80);

        // Stats
        textAlign(CENTER, TOP);
        textSize(12);
        text(`HP: ${enemy.hp}`, infoX + ENEMY_INFO_WIDTH / 2, infoY + 130);
        text(`Damage: ${enemy.damage}`, infoX + ENEMY_INFO_WIDTH / 2, infoY + 150);
    } else {
        // Prompt
        fill(180);
        textAlign(CENTER, CENTER);
        textSize(11);
        text('Click an enemy\nto view info', infoX + ENEMY_INFO_WIDTH / 2, infoY + UI_HEIGHT / 2 - 10);
    }
}

function drawHand() {
    const startX = STATS_WIDTH + 30;
    const spacing = CARD_WIDTH + 10;
    const handY = height - UI_HEIGHT + 20;

    for (let i = 0; i < gameState.hand.length; i++) {
        const card = gameState.hand[i];
        const x = startX + i * spacing;
        const y = handY;

        const isHovered = mouseX > x && mouseX < x + CARD_WIDTH &&
                         mouseY > y && mouseY < y + CARD_HEIGHT;

        const isSelected = gameState.selectedCard === card;

        if (isHovered) {
            gameState.hoverCard = card;
        }

        drawCard(card, x, y, isSelected, isHovered);
    }
}

function drawCard(card, x, y, selected, hovered) {
    // Card background
    if (selected) {
        fill(100, 150, 255);
    } else if (hovered) {
        fill(70, 70, 100);
    } else {
        fill(50, 50, 80);
    }

    stroke(200, 200, 220);
    strokeWeight(2);
    rect(x, y, CARD_WIDTH, CARD_HEIGHT, 8);

    // Card header with costs
    fill(255);
    const headerSize = Math.max(10, CARD_WIDTH / 12);
    textSize(headerSize);
    textAlign(LEFT, TOP);
    let headerText = `⏱️${card.turnCost} ${card.name}`;
    text(headerText, x + 5, y + 5);

    textAlign(RIGHT, TOP);
    text(`⚡${card.manaCost}`, x + CARD_WIDTH - 5, y + 5);

    // Card emoji
    const emojiSize = Math.max(32, CARD_WIDTH * 0.4);
    textSize(emojiSize);
    textAlign(CENTER, CENTER);
    text(card.emoji, x + CARD_WIDTH / 2, y + CARD_HEIGHT * 0.45);

    // Card description
    const descSize = Math.max(9, CARD_WIDTH / 13);
    textSize(descSize);
    fill(220);

    // Manual text wrapping and centering
    const words = card.description.split(' ');
    const maxWidth = CARD_WIDTH - 20;
    let lines = [];
    let currentLine = '';

    for (let word of words) {
        let testLine = currentLine + (currentLine ? ' ' : '') + word;
        textSize(descSize);
        if (textWidth(testLine) > maxWidth && currentLine !== '') {
            lines.push(currentLine);
            currentLine = word;
        } else {
            currentLine = testLine;
        }
    }
    if (currentLine) {
        lines.push(currentLine);
    }

    // Draw centered lines
    textAlign(CENTER, CENTER);
    const lineHeight = descSize * 1.2;
    const startY = y + CARD_HEIGHT * 0.7;
    for (let i = 0; i < lines.length; i++) {
        text(lines[i], x + CARD_WIDTH / 2, startY + i * lineHeight);
    }

    // Show if unplayable
    if (card.manaCost > gameState.player.mana) {
        fill(255, 0, 0, 100);
        noStroke();
        rect(x, y, CARD_WIDTH, CARD_HEIGHT, 8);
    }
}

function drawInnateAbility() {
    const x = 90;
    const y = height - UI_HEIGHT + 180;
    const radius = 50;

    const isHovered = dist(mouseX, mouseY, x, y) < radius / 2;

    if (isHovered) {
        gameState.hoverInnate = true;
        // Draw as card when hovered - position it to the right
        const cardX = STATS_WIDTH + 30;
        const cardY = height - UI_HEIGHT + 20;
        drawCard(CONCENTRATE, cardX, cardY, false, true);
    } else {
        gameState.hoverInnate = false;
    }

    // Draw circle
    if (gameState.channeling > 0) {
        fill(100, 100, 150);
    } else if (isHovered) {
        fill(80, 80, 120);
    } else {
        fill(60, 60, 100);
    }
    stroke(200, 200, 220);
    strokeWeight(2);
    circle(x, y, radius);

    // Draw emoji
    textSize(28);
    textAlign(CENTER, CENTER);
    fill(255);
    text(CONCENTRATE.emoji, x, y);
}

function drawTargetingOverlay(cameraX, cameraY) {
    const card = gameState.selectedCard;
    if (!card) return;

    const px = gameState.player.x;
    const py = gameState.player.y;

    // Draw range overlay in viewport
    for (let vx = 0; vx < viewportWidth; vx++) {
        for (let vy = 0; vy < viewportHeight; vy++) {
            const worldX = cameraX + vx;
            const worldY = cameraY + vy;
            const dist = Math.abs(worldX - px) + Math.abs(worldY - py);

            if (dist <= card.range) {
                fill(100, 150, 255, 50);
                noStroke();
                rect(vx * CELL_SIZE, vy * CELL_SIZE, CELL_SIZE, CELL_SIZE);
            }
        }
    }

    // Highlight cell under mouse
    const gridX = Math.floor(mouseX / CELL_SIZE);
    const gridY = Math.floor(mouseY / CELL_SIZE);
    const worldX = cameraX + gridX;
    const worldY = cameraY + gridY;

    const mapHeight = height - UI_HEIGHT;
    if (mouseY < mapHeight && gridX >= 0 && gridX < viewportWidth && gridY >= 0 && gridY < viewportHeight) {
        const dist = Math.abs(worldX - px) + Math.abs(worldY - py);
        if (dist <= card.range) {
            fill(255, 255, 100, 100);
            noStroke();
            rect(gridX * CELL_SIZE, gridY * CELL_SIZE, CELL_SIZE, CELL_SIZE);
        }
    }
}

function keyPressed() {
    if (gameState.turnInProgress) return;

    let moved = false;
    let newX = gameState.player.x;
    let newY = gameState.player.y;

    // Movement with WASD or arrow keys
    if (key === 'w' || key === 'W' || keyCode === UP_ARROW) {
        newY--;
        moved = true;
    } else if (key === 's' || key === 'S' || keyCode === DOWN_ARROW) {
        newY++;
        moved = true;
    } else if (key === 'a' || key === 'A' || keyCode === LEFT_ARROW) {
        newX--;
        moved = true;
    } else if (key === 'd' || key === 'D' || keyCode === RIGHT_ARROW) {
        newX++;
        moved = true;
    } else if (key === '.') {
        // Wait
        endTurn();
        return;
    }

    if (moved) {
        // Check bounds
        if (newX >= 0 && newX < GRID_SIZE && newY >= 0 && newY < GRID_SIZE) {
            // Check for enemy collision
            const enemy = gameState.enemies.find(e => e.x === newX && e.y === newY);
            if (enemy) {
                // Attack enemy with melee
                enemy.hp -= 1;
                if (enemy.hp <= 0) {
                    gameState.enemies = gameState.enemies.filter(e => e !== enemy);
                    if (gameState.selectedEnemy === enemy) {
                        gameState.selectedEnemy = null;
                    }
                }
                endTurn();
            } else {
                // Move player
                gameState.player.x = newX;
                gameState.player.y = newY;
                endTurn();
            }
        }
    }
}

function mousePressed() {
    const startX = STATS_WIDTH + 30;
    const spacing = CARD_WIDTH + 10;
    const handY = height - UI_HEIGHT + 20;
    const mapHeight = height - UI_HEIGHT;

    // Check innate ability click
    const innateX = 90;
    const innateY = height - UI_HEIGHT + 180;
    if (dist(mouseX, mouseY, innateX, innateY) < 25) {
        if (!gameState.turnInProgress && gameState.channeling === 0) {
            gameState.channeling = CONCENTRATE.turnCost;
            endTurn();
        }
        return;
    }

    // Check card clicks
    for (let i = 0; i < gameState.hand.length; i++) {
        const card = gameState.hand[i];
        const x = startX + i * spacing;
        const y = handY;

        if (mouseX > x && mouseX < x + CARD_WIDTH &&
            mouseY > y && mouseY < y + CARD_HEIGHT) {

            if (card.manaCost > gameState.player.mana) {
                return; // Can't play this card
            }

            if (gameState.selectedCard === card) {
                // Deselect
                gameState.selectedCard = null;
                gameState.targeting = false;
            } else {
                // Select card
                gameState.selectedCard = card;
                gameState.targeting = true;
            }
            return;
        }
    }

    // Check if clicking on grid
    if (mouseY < mapHeight) {
        const cameraX = gameState.player.x - Math.floor(viewportWidth / 2);
        const cameraY = gameState.player.y - Math.floor(viewportHeight / 2);

        const gridX = Math.floor(mouseX / CELL_SIZE);
        const gridY = Math.floor(mouseY / CELL_SIZE);
        const worldX = cameraX + gridX;
        const worldY = cameraY + gridY;

        // Check for targeting
        if (gameState.targeting && gameState.selectedCard) {
            const card = gameState.selectedCard;
            const dist = Math.abs(worldX - gameState.player.x) + Math.abs(worldY - gameState.player.y);

            if (dist <= card.range) {
                playCard(card, worldX, worldY);
            }
        } else {
            // Check for enemy selection
            const clickedEnemy = gameState.enemies.find(e => e.x === worldX && e.y === worldY);
            if (clickedEnemy) {
                gameState.selectedEnemy = clickedEnemy;
            } else {
                gameState.selectedEnemy = null;
            }
        }
    }
}

function playCard(card, targetX, targetY) {
    // Find target
    let target = null;
    if (card.range > 0) {
        target = gameState.enemies.find(e => e.x === targetX && e.y === targetY);
        if (!target && (targetX !== gameState.player.x || targetY !== gameState.player.y)) {
            return; // Must target something for damage spells
        }
    }

    // Pay costs
    gameState.player.mana -= card.manaCost;

    // Remove from hand and add to discard
    gameState.hand = gameState.hand.filter(c => c !== card);
    gameState.discardPile.push(card);

    // Apply effect
    card.effect(target);

    // Clear selection
    gameState.selectedCard = null;
    gameState.targeting = false;

    // End turn if card costs turns
    if (card.turnCost > 0) {
        endTurn();
    }
}

function endTurn() {
    gameState.turnInProgress = true;

    // Handle channeling
    if (gameState.channeling > 0) {
        gameState.channeling--;
        if (gameState.channeling === 0) {
            CONCENTRATE.effect();
        }
    }

    // Enemy turns
    for (let enemy of gameState.enemies) {
        moveEnemyTowardPlayer(enemy);
    }

    gameState.turnInProgress = false;
}

function moveEnemyTowardPlayer(enemy) {
    const dx = gameState.player.x - enemy.x;
    const dy = gameState.player.y - enemy.y;

    // Check if adjacent to player
    if (Math.abs(dx) + Math.abs(dy) === 1) {
        // Attack player
        gameState.player.hp -= enemy.damage;
        if (gameState.player.hp <= 0) {
            console.log('Game Over!');
            noLoop();
        }
        return;
    }

    // Move toward player
    if (Math.abs(dx) > Math.abs(dy)) {
        const newX = enemy.x + Math.sign(dx);
        if (!isPositionOccupied(newX, enemy.y)) {
            enemy.x = newX;
        }
    } else if (dy !== 0) {
        const newY = enemy.y + Math.sign(dy);
        if (!isPositionOccupied(enemy.x, newY)) {
            enemy.y = newY;
        }
    }
}

function isPositionOccupied(x, y) {
    if (gameState.player.x === x && gameState.player.y === y) return true;
    return gameState.enemies.some(e => e.x === x && e.y === y);
}

function drawCards(count) {
    for (let i = 0; i < count; i++) {
        if (gameState.deck.length === 0) {
            // Shuffle discard pile back into deck
            gameState.deck = [...gameState.discardPile];
            gameState.discardPile = [];
            shuffleDeck();
        }

        if (gameState.deck.length > 0) {
            gameState.hand.push(gameState.deck.pop());
        }
    }
}

function shuffleDeck() {
    for (let i = gameState.deck.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [gameState.deck[i], gameState.deck[j]] = [gameState.deck[j], gameState.deck[i]];
    }
}

function spawnEnemies(count) {
    const enemyTypes = [
        { emoji: '💀', name: 'Skeleton', hp: 3, damage: 1 },
        { emoji: '🧟', name: 'Zombie', hp: 4, damage: 2 },
        { emoji: '👻', name: 'Ghost', hp: 2, damage: 1 }
    ];

    for (let i = 0; i < count; i++) {
        let x, y;
        do {
            x = Math.floor(Math.random() * GRID_SIZE);
            y = Math.floor(Math.random() * GRID_SIZE);
        } while (isPositionOccupied(x, y) ||
                 (Math.abs(x - gameState.player.x) < 5 && Math.abs(y - gameState.player.y) < 5));

        const type = enemyTypes[Math.floor(Math.random() * enemyTypes.length)];
        gameState.enemies.push({
            x, y,
            type: 'enemy',
            ...type
        });
    }
}

function mouseMoved() {
    gameState.hoverCard = null;
    gameState.hoverInnate = false;
}
</script>
</body>
